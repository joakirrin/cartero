actions:
  - repo: cartero
    type: write
    path: cartero/cli.py
    content: |
      from __future__ import annotations

      import argparse
      from collections import defaultdict
      from pathlib import Path
      from typing import Iterable, Sequence

      from rich.console import Console, Group
      from rich.panel import Panel
      from rich.text import Text

      from cartero.executor import execute_actions
      from cartero.parser import ParseError, load_summary
      from cartero.simulator import SimulatedAction, simulate_actions
      from cartero.validator import ALLOWED_REPOS, Change, ValidationError, validate_summary

      VALID_MODES = {"dry-run", "apply"}
      ACTION_STYLES = {
          "write": "blue",
          "delete": "red",
          "mkdir": "yellow",
      }


      def build_parser() -> argparse.ArgumentParser:
          parser = argparse.ArgumentParser(
              prog="cartero",
              description="Validate an actions YAML file and print a dry-run repo plan.",
          )
          mode_group = parser.add_mutually_exclusive_group()
          mode_group.add_argument(
              "--dry-run",
              action="store_true",
              help="Preview the execution plan without making changes.",
          )
          mode_group.add_argument(
              "--apply",
              action="store_true",
              help="Apply the changes described in the summary file.",
          )
          parser.add_argument("summary", help="Path to the YAML summary file.")
          return parser


      def main(argv: Sequence[str] | None = None) -> int:
          args = build_parser().parse_args(argv)
          console = Console()
          error_console = Console(stderr=True)
          mode = "apply" if args.apply else "dry-run"
          # Explicitly ignore args.dry_run because default mode is already dry-run.

          try:
              raw_summary = load_summary(args.summary)
              summary = validate_summary(raw_summary)
          except (ParseError, ValidationError) as exc:
              error_console.print(Text.assemble(("error: ", "red"), (str(exc),)))
              return 2

          render_plan(Path(args.summary), summary.actions, mode, console=console)
          return 0


      def render_plan(
          summary_path: Path,
          changes: Iterable[Change],
          mode: str,
          *,
          console: Console | None = None,
      ) -> Group:
          if mode not in VALID_MODES:
              raise ValueError(f"Unsupported mode: {mode}")

          if console is None:
              console = Console()

          change_list = tuple(changes)
          grouped: dict[str, list[SimulatedAction]] = defaultdict(list)
          total_changes = 0

          for simulated_action in simulate_actions(change_list):
              grouped[simulated_action.repo].append(simulated_action)
              total_changes += 1

          renderables = [
              Panel.fit(
                  Group(
                      Text(f"Cartero {mode} plan"),
                      Text(f"Summary file: {summary_path}"),
                      Text(f"Mode: {_describe_mode(mode)}"),
                      Text(f"Validated actions: {total_changes}"),
                  ),
                  title="Cartero",
              )
          ]

          for repo in ALLOWED_REPOS:
              repo_changes = grouped.get(repo)
              if not repo_changes:
                  continue
              action_label = f"{repo} ({len(repo_changes)} action{'s' if len(repo_changes) != 1 else ''})"
              repo_lines: list[Text] = [Text(action_label)]
              for simulated_action in repo_changes:
                  repo_lines.extend(_render_simulated_action(simulated_action))
              renderables.append(Panel(Group(*repo_lines), title=repo))

          plan = Group(*renderables)
          console.print(plan)

          if mode == "dry-run":
              console.print(_build_status_line())
              return plan

          console.rule("Simulated execution")
          execute_actions(change_list, console=console)
          return plan


      def _describe_mode(mode: str) -> str:
          if mode == "apply":
              return "apply"
          return "dry-run"


      def _build_status_line() -> Text:
          return Text("No file or git changes were made.", style="green")


      def _render_simulated_action(simulated_action: SimulatedAction) -> list[Text]:
          style = ACTION_STYLES[_get_action_type(simulated_action)]
          lines = [Text(f"- {simulated_action.summary}", style=style)]

          for detail in simulated_action.details:
              lines.append(Text(f"  {detail}", style="dim"))

          return lines


      def _get_action_type(simulated_action: SimulatedAction) -> str:
          if simulated_action.summary.startswith("simulate write "):
              return "write"
          if simulated_action.summary.startswith("simulate delete "):
              return "delete"
          if simulated_action.summary.startswith("simulate mkdir "):
              return "mkdir"
          raise ValueError(f"Unsupported simulated action summary: {simulated_action.summary}")

  - repo: cartero
    type: write
    path: tests/test_cli.py
    content: |
      from __future__ import annotations

      import io
      import tempfile
      import unittest
      from contextlib import redirect_stderr, redirect_stdout
      from pathlib import Path
      from unittest.mock import patch

      from cartero.cli import main
      from cartero.executor import execute_actions as real_execute_actions


      class CliTests(unittest.TestCase):
          def test_cli_defaults_to_dry_run(self) -> None:
              exit_code, output, error = self._run_main(["tests/fixtures/sample_summary.yaml"])

              self.assertEqual(exit_code, 0)
              self.assertEqual(error, "")
              self.assertIn("Cartero dry-run plan", output)
              self.assertIn("Mode: dry-run", output)
              self.assertIn("Validated actions: 3", output)
              self.assertIn("casadora-core (1 action)", output)
              self.assertIn("simulate write file: docs/architecture/network.md", output)
              self.assertIn("content preview:", output)
              self.assertIn("# Network", output)
              self.assertIn("casadora-services (1 action)", output)
              self.assertIn("simulate delete file: docker/legacy-compose.yaml", output)
              self.assertIn("cartero (1 action)", output)
              self.assertIn("simulate mkdir dir: tests/fixtures/generated", output)
              self.assertIn("No file or git changes were made.", output)

          def test_cli_accepts_explicit_dry_run(self) -> None:
              exit_code, output, error = self._run_main(
                  ["--dry-run", "tests/fixtures/sample_summary.yaml"]
              )

              self.assertEqual(exit_code, 0)
              self.assertEqual(error, "")
              self.assertIn("Cartero dry-run plan", output)
              self.assertIn("Mode: dry-run", output)
              self.assertIn("No file or git changes were made.", output)

          def test_cli_apply_calls_executor(self) -> None:
              with patch("cartero.cli.execute_actions", wraps=real_execute_actions) as mock_execute:
                  exit_code, output, error = self._run_main(
                      ["--apply", "tests/fixtures/sample_summary.yaml"]
                  )

              self.assertEqual(exit_code, 0)
              self.assertEqual(error, "")
              self.assertIn("Cartero apply plan", output)
              self.assertIn("Mode: apply", output)
              self.assertIn("Simulated execution", output)
              self.assertIn("[executing] write -> docs/architecture/network.md", output)
              self.assertIn("[executing] delete -> docker/legacy-compose.yaml", output)
              self.assertIn("[executing] mkdir -> tests/fixtures/generated", output)
              self.assertNotIn("No file or git changes were made.", output)
              self.assertLess(output.index("Cartero apply plan"), output.index("Simulated execution"))
              self.assertLess(output.index("Simulated execution"), output.index("[executing]"))
              mock_execute.assert_called_once()

              called_changes = mock_execute.call_args.args[0]
              self.assertEqual(len(called_changes), 3)
              self.assertEqual(called_changes[0].change_type, "write")
              self.assertEqual(called_changes[1].change_type, "delete")
              self.assertEqual(called_changes[2].change_type, "mkdir")
              self.assertIn("console", mock_execute.call_args.kwargs)

          def test_cli_rejects_conflicting_mode_flags(self) -> None:
              stdout = io.StringIO()
              stderr = io.StringIO()

              with self.assertRaises(SystemExit) as context:
                  with redirect_stdout(stdout), redirect_stderr(stderr):
                      main(["--apply", "--dry-run", "tests/fixtures/sample_summary.yaml"])

              self.assertEqual(context.exception.code, 2)
              self.assertEqual(stdout.getvalue(), "")
              self.assertIn("not allowed with argument", stderr.getvalue())

          def test_cli_returns_error_for_invalid_summary(self) -> None:
              with tempfile.TemporaryDirectory() as temp_dir:
                  summary_path = Path(temp_dir) / "invalid.yaml"
                  summary_path.write_text("actions:\n  - repo: cartero\n", encoding="utf-8")

                  stdout = io.StringIO()
                  stderr = io.StringIO()
                  with redirect_stdout(stdout), redirect_stderr(stderr):
                      exit_code = main([str(summary_path)])

              self.assertEqual(exit_code, 2)
              self.assertEqual(stdout.getvalue(), "")
              self.assertIn("error:", stderr.getvalue())

          def _run_main(self, argv: list[str]) -> tuple[int, str, str]:
              stdout = io.StringIO()
              stderr = io.StringIO()

              with redirect_stdout(stdout), redirect_stderr(stderr):
                  exit_code = main(argv)

              return exit_code, stdout.getvalue(), stderr.getvalue()

  - repo: cartero
    type: write
    path: cartero/web.py
    content: |
      from __future__ import annotations

      import io
      from pathlib import Path
      from typing import Any

      import yaml
      from flask import Flask, render_template, request
      from rich.console import Console

      from cartero.cli import render_plan
      from cartero.parser import ParseError, StrictLoader
      from cartero.validator import ValidationError, validate_summary


      SAMPLE_SUMMARY_YAML = """actions:
        - repo: casadora-core
          type: write
          path: docs/architecture/network.md
          content: |
            # Network
            - Updated switch inventory
        - repo: casadora-services
          type: delete
          path: docker/legacy-compose.yaml
        - repo: cartero
          type: mkdir
          path: tests/fixtures/generated
      """
      WEB_SUMMARY_PATH = Path("web-input.yaml")
      SUPPORTED_MODES = {"dry-run", "apply"}


      def create_app() -> Flask:
          app = Flask(__name__)

          @app.get("/")
          def index() -> str:
              return _render_page(
                  yaml_text="",
                  sample_yaml=SAMPLE_SUMMARY_YAML,
              )

          @app.post("/")
          def run() -> tuple[str, int] | str:
              yaml_text = request.form.get("yaml_text", "")
              action = request.form.get("action", "dry-run")

              if action not in SUPPORTED_MODES:
                  return (
                      _render_page(
                          yaml_text=yaml_text,
                          error_message="Error: Unsupported action.",
                          sample_yaml=SAMPLE_SUMMARY_YAML,
                      ),
                      400,
                  )

              try:
                  raw_summary = _load_summary_text(yaml_text)
                  summary = validate_summary(raw_summary)
                  result_text = _render_output(mode=action, actions=summary.actions)
              except (ParseError, ValidationError) as exc:
                  return (
                      _render_page(
                          yaml_text=yaml_text,
                          error_message=f"Error: {exc}",
                          sample_yaml=SAMPLE_SUMMARY_YAML,
                      ),
                      400,
                  )

              return _render_page(
                  yaml_text=yaml_text,
                  result_label=_describe_result_label(action),
                  result_text=result_text,
                  sample_yaml=SAMPLE_SUMMARY_YAML,
                  output_filename=_build_output_filename(action),
              )

          return app


      def main() -> None:
          app = create_app()
          app.run(host="127.0.0.1", port=8000, debug=False)


      def _describe_result_label(mode: str) -> str:
          if mode == "apply":
              return "Apply (simulated)"
          return "Dry-run"


      def _build_output_filename(mode: str) -> str:
          if mode == "apply":
              return "cartero-apply-output.txt"
          return "cartero-dry-run-output.txt"


      def _load_summary_text(raw_text: str) -> dict[str, Any]:
          try:
              loaded = yaml.load(raw_text, Loader=StrictLoader)
          except yaml.YAMLError as exc:
              raise ParseError(f"Invalid YAML: {exc}") from exc

          if not isinstance(loaded, dict):
              raise ParseError("Summary root must be a YAML mapping.")

          return loaded


      def _render_output(*, mode: str, actions: Any) -> str:
          buffer = io.StringIO()
          console = Console(file=buffer, force_terminal=False, color_system=None)
          render_plan(WEB_SUMMARY_PATH, actions, mode, console=console)
          return buffer.getvalue().strip()


      def _render_page(
          *,
          yaml_text: str,
          sample_yaml: str,
          error_message: str | None = None,
          result_label: str | None = None,
          result_text: str | None = None,
          output_filename: str | None = None,
      ) -> str:
          return render_template(
              "index.html",
              yaml_text=yaml_text,
              sample_yaml=sample_yaml,
              error_message=error_message,
              result_label=result_label,
              result_text=result_text,
              output_filename=output_filename,
          )

  - repo: cartero
    type: write
    path: cartero/templates/index.html
    content: |
      <!doctype html>
      <html lang="en">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Cartero Local UI</title>
          <style>
            :root {
              color-scheme: light;
              --bg: #f3efe6;
              --panel: #fffdf8;
              --border: #d5c8b0;
              --text: #1f1a14;
              --muted: #6a5d4b;
              --accent: #23443b;
              --error-bg: #fff0ec;
              --error-border: #d78b73;
            }

            * {
              box-sizing: border-box;
            }

            body {
              margin: 0;
              font-family: Georgia, "Times New Roman", serif;
              background:
                radial-gradient(circle at top left, #fbf7ee 0, transparent 28%),
                linear-gradient(180deg, #efe7d8 0%, var(--bg) 100%);
              color: var(--text);
            }

            main {
              max-width: 960px;
              margin: 0 auto;
              padding: 32px 20px 48px;
            }

            h1 {
              margin: 0 0 8px;
              font-size: 2.2rem;
            }

            .intro {
              margin: 0 0 24px;
              color: var(--muted);
            }

            .panel {
              background: var(--panel);
              border: 1px solid var(--border);
              border-radius: 14px;
              padding: 18px;
              box-shadow: 0 10px 30px rgba(57, 43, 20, 0.08);
            }

            form {
              display: grid;
              gap: 16px;
            }

            .toolbar {
              display: flex;
              flex-wrap: wrap;
              gap: 10px;
            }

            .secondary-toolbar {
              display: flex;
              flex-wrap: wrap;
              gap: 10px;
            }

            button {
              border: 1px solid var(--accent);
              border-radius: 999px;
              background: transparent;
              color: var(--accent);
              cursor: pointer;
              font: inherit;
              padding: 10px 16px;
            }

            button.primary {
              background: var(--accent);
              color: #fffdf8;
            }

            button:disabled {
              border-color: #b5aa96;
              color: #8f846f;
              cursor: not-allowed;
            }

            textarea {
              width: 100%;
              min-height: 340px;
              resize: vertical;
              border: 1px solid var(--border);
              border-radius: 12px;
              background: #fffefb;
              color: var(--text);
              font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
              font-size: 0.95rem;
              line-height: 1.5;
              padding: 16px;
            }

            .result {
              margin-top: 20px;
            }

            .result-header {
              display: flex;
              align-items: center;
              justify-content: space-between;
              gap: 12px;
              margin-bottom: 12px;
            }

            .badge {
              border-radius: 999px;
              background: #e5efe9;
              color: var(--accent);
              font-size: 0.9rem;
              padding: 6px 12px;
            }

            .error {
              border-color: var(--error-border);
              background: var(--error-bg);
            }

            pre {
              margin: 0;
              overflow-x: auto;
              white-space: pre-wrap;
              word-break: break-word;
              font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
              font-size: 0.92rem;
              line-height: 1.5;
            }

            @media (max-width: 640px) {
              main {
                padding: 24px 14px 40px;
              }

              .result-header {
                align-items: flex-start;
                flex-direction: column;
              }
            }
          </style>
        </head>
        <body>
          <main>
            <h1>Cartero Local UI</h1>
            <p class="intro">Paste a Commit Summary YAML, run a dry-run or simulated apply, and review the output below.</p>

            <section class="panel">
              <form method="post">
                <label for="yaml_text">Commit Summary YAML</label>
                <textarea id="yaml_text" name="yaml_text" spellcheck="false">{{ yaml_text }}</textarea>

                <div class="toolbar">
                  <button type="button" id="load-sample">Load sample</button>
                  <button type="submit" name="action" value="dry-run">Dry-run</button>
                  <button type="submit" name="action" value="apply" class="primary">Apply (simulated)</button>
                  <button type="button" id="download-yaml">Download YAML</button>
                </div>
              </form>
            </section>

            {% if error_message %}
            <section class="panel error result">
              <div class="result-header">
                <h2>Error</h2>
              </div>
              <pre>{{ error_message }}</pre>
            </section>
            {% endif %}

            {% if result_text %}
            <section class="panel result">
              <div class="result-header">
                <h2>Result</h2>
                <span class="badge">{{ result_label }}</span>
              </div>
              <div class="secondary-toolbar">
                <button
                  type="button"
                  id="download-output"
                  {% if not result_text %}disabled{% endif %}
                >
                  Download output
                </button>
                <button
                  type="button"
                  id="copy-output"
                  {% if not result_text %}disabled{% endif %}
                >
                  Copy output
                </button>
              </div>
              <pre>{{ result_text }}</pre>
            </section>
            {% else %}
            <section class="panel result">
              <div class="result-header">
                <h2>Result</h2>
                <span class="badge">No output yet</span>
              </div>
              <div class="secondary-toolbar">
                <button type="button" id="download-output" disabled>Download output</button>
                <button type="button" id="copy-output" disabled>Copy output</button>
              </div>
              <pre>Run a dry-run or simulated apply to see output here.</pre>
            </section>
            {% endif %}
          </main>

          <script>
            const sampleYaml = {{ sample_yaml | tojson }};
            const outputText = {{ (result_text or "") | tojson }};
            const outputFilename = {{ (output_filename or "cartero-output.txt") | tojson }};
            const yamlInput = document.getElementById("yaml_text");
            const loadSampleButton = document.getElementById("load-sample");
            const downloadYamlButton = document.getElementById("download-yaml");
            const downloadOutputButton = document.getElementById("download-output");
            const copyOutputButton = document.getElementById("copy-output");

            loadSampleButton.addEventListener("click", () => {
              yamlInput.value = sampleYaml;
            });

            downloadYamlButton.addEventListener("click", () => {
              const blob = new Blob([yamlInput.value], { type: "text/yaml;charset=utf-8" });
              const url = URL.createObjectURL(blob);
              const link = document.createElement("a");

              link.href = url;
              link.download = "commit-summary.yaml";
              link.click();
              URL.revokeObjectURL(url);
            });

            downloadOutputButton.addEventListener("click", () => {
              if (!outputText) {
                return;
              }

              const blob = new Blob([outputText], { type: "text/plain;charset=utf-8" });
              const url = URL.createObjectURL(blob);
              const link = document.createElement("a");

              link.href = url;
              link.download = outputFilename;
              link.click();
              URL.revokeObjectURL(url);
            });

            copyOutputButton.addEventListener("click", async () => {
              if (!outputText) {
                return;
              }

              const originalLabel = copyOutputButton.textContent;

              try {
                await navigator.clipboard.writeText(outputText);
                copyOutputButton.textContent = "Copied";
                window.setTimeout(() => {
                  copyOutputButton.textContent = originalLabel;
                }, 1200);
              } catch (_error) {
                copyOutputButton.textContent = "Copy failed";
                window.setTimeout(() => {
                  copyOutputButton.textContent = originalLabel;
                }, 1200);
              }
            });
          </script>
        </body>
      </html>


