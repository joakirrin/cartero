      [build-system]
      requires = ["setuptools>=68"]
      build-backend = "setuptools.build_meta"

      [project]
      name = "cartero"
      version = "0.1.0"
      description = "Convert structured YAML summaries into repo-scoped change plans."
      requires-python = ">=3.11"
      dependencies = ["Flask>=3.1,<4", "PyYAML>=6.0,<7", "rich>=13.0"]

      [project.scripts]
      cartero = "cartero.cli:main"
      cartero-web = "cartero.web:main"

      [project.optional-dependencies]
      dev = ["pytest>=9.0"]